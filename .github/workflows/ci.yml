name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTUP_MAX_RETRIES: 10

jobs:

  check:
    name: Check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "async"
          - "mock"
          - "flash"
          - "tracing"
          - "async,mock"
          - "async,mock,flash,tracing"
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Install libudev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Check
      run: cargo check --all-targets --features "${{ matrix.features }}" --verbose

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Install libudev (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libudev-dev

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Build
      run: cargo build --all-features --verbose

    - name: Build examples
      run: cargo build --examples --all-features --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Install libudev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

    - name: Test
      run: cargo test --all-features --verbose

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Install libudev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo-audit
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/cargo-audit
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
        key: ${{ runner.os }}-cargo-audit
        restore-keys: |
          ${{ runner.os }}-cargo-audit-

    - name: Install cargo-audit
      run: |
        if ! command -v cargo-audit &> /dev/null; then
          cargo install cargo-audit
        fi

    - name: Run security audit
      run: cargo audit

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Install libudev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev

    - name: Check documentation
      run: cargo doc --no-deps --all-features
      env:
        RUSTDOCFLAGS: "-D warnings"

  publish_check:
    name: Publish Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Install libudev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev

    - name: Check if publishable
      run: cargo publish -p medius --dry-run --allow-dirty

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check, build, test, fmt, clippy, security_audit, docs, publish_check, capi, capi-lint, cbindgen-drift, python, bindings_sdist, bindings_wheels]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    outputs:
      should_publish: ${{ steps.check_version.outputs.should_publish }}
      version: ${{ steps.check_version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Install libudev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev

    - name: Check if version already published
      id: check_version
      run: |
        CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="medius") | .version')
        echo "version=$CRATE_VERSION" >> $GITHUB_OUTPUT

        if curl -s "https://crates.io/api/v1/crates/medius" | jq -e ".versions[] | select(.num == \"$CRATE_VERSION\")" > /dev/null 2>&1; then
          echo "Version $CRATE_VERSION already exists on crates.io"
          echo "should_publish=false" >> $GITHUB_OUTPUT
        else
          echo "Version $CRATE_VERSION not found on crates.io, proceeding with publish"
          echo "should_publish=true" >> $GITHUB_OUTPUT
        fi

    - name: Login to crates.io
      if: steps.check_version.outputs.should_publish == 'true'
      run: cargo login ${{ secrets.CRATES_IO_TOKEN }}

    - name: Publish to crates.io
      if: steps.check_version.outputs.should_publish == 'true'
      run: cargo publish -p medius

    - name: Create GitHub Release
      if: steps.check_version.outputs.should_publish == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.check_version.outputs.version }}
        name: Release v${{ steps.check_version.outputs.version }}
        body: |
          ## medius v${{ steps.check_version.outputs.version }}

          This release passed all CI checks:
          - Tests across all feature combinations
          - Build on Linux, macOS, and Windows
          - Code formatting and linting
          - Security audit
          - Documentation

          Published to [crates.io](https://crates.io/crates/medius)
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- bindings release: only on a new version (gated by the publish job) ---

  bindings_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Build the self-contained sdist
      run: |
        python -m pip install build
        python -m build --sdist -o dist bindings/python
    - uses: actions/upload-artifact@v4
      with:
        name: dist-sdist
        path: dist/*.tar.gz

  bindings_wheels:
    name: Wheels (${{ matrix.os }})
    needs: bindings_sdist
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is arm64 only: the Intel (macos-13) hosted runner no longer
        # picks up jobs, so Intel Macs build from the sdist instead.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/download-artifact@v4
      with:
        name: dist-sdist
        path: dist
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Build wheels from the sdist
      shell: bash
      run: |
        python -m pip install 'cibuildwheel~=2.21'
        python -m cibuildwheel --output-dir wheelhouse dist/medius-*.tar.gz
    - uses: actions/upload-artifact@v4
      with:
        name: dist-wheels-${{ matrix.os }}
        path: wheelhouse/*.whl

  publish_pypi:
    name: Publish wheels to PyPI
    needs: [publish, bindings_sdist, bindings_wheels]
    if: needs.publish.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: dist-*
        path: dist
        merge-multiple: true
    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist

  capi_libs:
    name: C ABI library (${{ matrix.os }})
    needs: publish
    if: needs.publish.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Install libudev (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - name: Build the C ABI library
      run: cargo build -p medius-capi --release
    - name: Package header + libraries
      shell: bash
      run: |
        triple=$(rustc -vV | sed -n 's/host: //p')
        out="medius-capi-${triple}"
        mkdir -p "$out/include" "$out/lib"
        cp medius-capi/include/medius.h "$out/include/"
        cp target/release/*medius_capi.{so,dylib,a} "$out/lib/" 2>/dev/null || true
        cp target/release/medius_capi.dll target/release/medius_capi.dll.lib target/release/medius_capi.lib "$out/lib/" 2>/dev/null || true
        tar -czf "${out}.tar.gz" "$out"
        ls -la "${out}.tar.gz"
    - uses: actions/upload-artifact@v4
      with:
        name: capi-${{ matrix.os }}
        path: medius-capi-*.tar.gz
    - name: Attach to the release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.publish.outputs.version }}
        files: medius-capi-*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- C ABI + Python binding validation (gates the publish job above) ---

  capi:
    name: C ABI build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Install libudev (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-capi-${{ hashFiles('**/Cargo.toml') }}
    - name: Build (default features)
      run: cargo build -p medius-capi --verbose
    - name: Build (mock + flash)
      run: cargo build -p medius-capi --features mock,flash --verbose
    - name: Test (mock)
      run: cargo test -p medius-capi --features mock --verbose

  capi-lint:
    name: C ABI clippy + fmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: Install libudev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - name: Format
      run: cargo fmt -p medius-capi -- --check
    - name: Clippy
      run: cargo clippy -p medius-capi --all-targets --all-features -- -D warnings

  cbindgen-drift:
    name: cbindgen header is up to date
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Install cbindgen (pinned)
      run: cargo install cbindgen --version 0.29.4 --locked
    - name: Regenerate the header
      run: bash tools/gen-header.sh
    - name: Fail if the committed header is stale
      run: git diff --exit-code medius-capi/include/medius.h

  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install libudev
      run: sudo apt-get update && sudo apt-get install -y libudev-dev
    - name: Install pytest
      run: python -m pip install --upgrade pip pytest
    - name: Run the mock-backed suite
      # conftest builds the mock cdylib and points MEDIUS_LIB at it.
      run: python -m pytest bindings/python/tests/ -v
