[package]
name = "medius"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Host control library for the medius transparent mouse passthrough box"
license = "MIT OR Apache-2.0"
keywords = ["medius", "mouse", "hid", "serial", "injection"]
categories = ["hardware-support", "api-bindings"]

# docs.rs builds with every feature enabled and the `docsrs` cfg set, so the doc_auto_cfg feature
# badges (see lib.rs) render on docs.rs. The cfg only activates there, so stable/CI builds are
# unaffected.
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
async = []                              # thin wrapper over the sync core (flume async recv, no runtime dep)
mock = []                               # public scriptable fake box
metrics = ["dep:hdrhistogram"]          # pacer jitter/latency histograms
flash = []                              # esptool reboot+flash handoff
# CLI wants --json (serde + serde_json), bench histograms (metrics), and -v/-vv (tracing subscriber).
cli = ["dep:clap", "dep:serde_json", "dep:tracing-subscriber", "serde", "metrics", "tracing"]
tracing = ["dep:tracing"]               # library-side instrumentation
serde = ["dep:serde"]                   # derives on value types

[dependencies]
thiserror = "2"
flume = "0.11"
parking_lot = "0.12"
hdrhistogram = { version = "7", optional = true }
clap = { version = "4", features = ["derive"], optional = true }
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = [
  "fmt",
  "env-filter",
], optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }

[dev-dependencies]
serde_json = "1"
# Async tests use futures' executor::block_on — NO tokio (the wrapper is runtime-agnostic).
futures = { version = "0.3", default-features = false, features = ["executor"] }

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
  "Win32_Foundation",
  "Win32_Storage_FileSystem",
  "Win32_Devices_Communication",
  "Win32_System_IO",
  "Win32_System_Threading",
  "Win32_System_Performance",
  "Win32_Security",
  "Win32_Devices_DeviceAndDriverInstallation",
] }

[[bin]]
name = "medius"
required-features = ["cli"]

# basic / paced open a real device — they compile everywhere, but need a connected box to RUN.
[[example]]
name = "basic"

[[example]]
name = "paced"

# mock is fully runnable with no hardware (the scriptable fake box).
[[example]]
name = "mock"
required-features = ["mock"]

# async demo also runs hardware-free, over the mock box, on any executor.
[[example]]
name = "async"
required-features = ["async", "mock"]
