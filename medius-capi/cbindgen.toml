language = "C"
pragma_once = true
include_guard = "MEDIUS_H"
autogen_warning = "/* Generated by tools/gen-header.sh (cbindgen). Do not edit by hand. */"
header = "/* medius C ABI. See https://github.com/K4HVH/medius. MIT. */"
cpp_compat = true
documentation = true
documentation_style = "c99"
tab_width = 4
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
no_includes = true

[defines]
"feature = mock" = "MEDIUS_FEATURE_MOCK"
"feature = flash" = "MEDIUS_FEATURE_FLASH"

[parse]
parse_deps = false

[export]
prefix = ""

[enum]
rename_variants = "QualifiedScreamingSnakeCase"
prefix_with_name = false

[fn]
sort_by = "None"

[const]
allow_static_const = true
allow_constexpr = false
